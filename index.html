<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio Digital</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo-area">
                <img id="store-logo" src="https://via.placeholder.com/50" class="logo-img">
                <h1 id="store-name">Restaurante</h1>
            </div>
            <div class="search-box">
                <i class="fas fa-search"></i>
            </div>
        </div>
    </header>

    <div class="banner" id="banner" style="background-image: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1000&q=80')">
        <div class="banner-info">
            <h2>Bem-vindo!</h2>
            <p><i class="fas fa-clock"></i> Aberto agora • Entrega em 30-40 min</p>
        </div>
    </div>

    <div class="categories-container" id="categories-list">
        <!-- Categorias injetadas via JS -->
    </div>

    <main class="products-grid" id="products-grid">
        <!-- Produtos injetados via JS -->
    </main>

    <div class="cart-fab" onclick="toggleCart()">
        <i class="fas fa-shopping-cart"></i>
        <span class="cart-count" id="cart-count">0</span>
    </div>

    <!-- Modal Carrinho -->
    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <h2>Seu Carrinho</h2>
            <div id="cart-items">
                <!-- Itens do carrinho -->
            </div>
            <hr>
            <div class="total-area">
                <h3>Total: <span id="cart-total">R$ 0,00</span></h3>
            </div>
            <button class="btn-checkout" onclick="checkout()" style="width: 100%; padding: 1rem; background: #27ae60; color: white; border: none; border-radius: 8px; margin-top: 1rem; font-weight: bold; cursor: pointer;">
                <i class="fab fa-whatsapp"></i> Finalizar no WhatsApp
            </button>
            <button onclick="toggleCart()" style="width: 100%; margin-top: 0.5rem; background: none; border: none; color: #666; cursor: pointer;">Continuar Comprando</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        }
    </script>
</body>
</html>
