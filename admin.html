<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo</title>
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <!-- Seção de Login -->
    <div id="login-section" class="login-container">
        <div class="login-box">
            <h2 class="text-center mb-4">Admin Login</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" style="width: 100%">Entrar</button>
            </form>
        </div>
    </div>

    <!-- Painel Administrativo -->
    <div id="admin-section" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-utensils"></i> Admin Pro
            </div>
            <nav>
                <a href="#" class="nav-link active"><i class="fas fa-chart-line"></i> Dashboard</a>
                <a href="#" class="nav-link"><i class="fas fa-box"></i> Produtos</a>
                <a href="#" class="nav-link"><i class="fas fa-list"></i> Categorias</a>
                <a href="#" class="nav-link"><i class="fas fa-cog"></i> Configurações</a>
                <a href="#" onclick="handleLogout()" class="nav-link mt-4"><i class="fas fa-sign-out-alt"></i> Sair</a>
            </nav>
        </div>

        <main class="main-content">
            <header class="d-flex justify-content-between align-items-center mb-4">
                <h2>Dashboard</h2>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Total de Produtos</h3>
                    <div class="value" id="total-products">0</div>
                </div>
                <div class="stat-card">
                    <h3>Pedidos Hoje</h3>
                    <div class="value" id="total-orders">0</div>
                </div>
                <div class="stat-card">
                    <h3>Vendas (R$)</h3>
                    <div class="value">R$ 0,00</div>
                </div>
            </div>

            <div class="card p-4 bg-white rounded shadow-sm mb-4">
                <h3>Cadastrar Novo Produto</h3>
                <form onsubmit="saveProduct(event)" class="mt-3">
                    <div class="grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label>Nome do Produto</label>
                            <input type="text" id="p-name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Preço</label>
                            <input type="number" step="0.01" id="p-price" class="form-control" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Descrição</label>
                        <textarea id="p-desc" class="form-control"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Imagem (Galeria)</label>
                        <input type="file" id="p-image" class="form-control" accept="image/*" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Salvar Produto</button>
                </form>
            </div>

            <div class="card p-4 bg-white rounded shadow-sm">
                <h3>Produtos Cadastrados</h3>
                <table class="data-table mt-3">
                    <thead>
                        <tr>
                            <th>Foto</th>
                            <th>Nome</th>
                            <th>Preço</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="products-table-body">
                        <!-- Injetado via JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
